<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>STARCRAW</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(41, 121, 255, 0.22), transparent 45%),
          radial-gradient(circle at bottom right, rgba(0, 229, 255, 0.12), transparent 36%),
          #040814;
        font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei UI", sans-serif;
      }
      .shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        border-radius: 24px;
        overflow: hidden;
        background: rgba(4, 8, 20, 0.94);
        box-shadow:
          inset 0 0 0 1px rgba(148, 163, 184, 0.14),
          0 22px 48px rgba(0, 0, 0, 0.42);
      }
      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.08) contrast(1.02);
      }
      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px 20px;
        background:
          linear-gradient(180deg, rgba(2, 6, 23, 0.55), transparent 26%, transparent 74%, rgba(2, 6, 23, 0.72));
        pointer-events: none;
      }
      .eyebrow {
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.78);
      }
      .footer {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }
      @keyframes status-dot-pulse {
        0%, 100% {
          transform: scale(1);
          opacity: 0.82;
          box-shadow:
            0 0 0 4px rgba(148, 163, 184, 0.08),
            0 0 18px rgba(191, 219, 254, 0.2);
        }
        50% {
          transform: scale(1.12);
          opacity: 1;
          box-shadow:
            0 0 0 6px rgba(148, 163, 184, 0.1),
            0 0 24px rgba(191, 219, 254, 0.34);
        }
      }
      @keyframes status-bar-rise {
        0%, 100% {
          transform: scaleY(0.42);
          opacity: 0.28;
        }
        50% {
          transform: scaleY(1);
          opacity: 0.92;
        }
      }
      .version {
        display: inline-flex;
        align-items: center;
        min-height: 20px;
        padding-bottom: 2px;
        font-size: 11px;
        letter-spacing: 0.08em;
        color: rgba(226, 232, 240, 0.58);
        text-shadow: 0 0 14px rgba(15, 23, 42, 0.22);
      }
      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 204px;
        padding: 8px 0 0;
        border-top: 1px solid rgba(226, 232, 240, 0.18);
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: rgba(248, 250, 252, 0.9);
        box-shadow:
          0 0 0 4px rgba(148, 163, 184, 0.08),
          0 0 18px rgba(191, 219, 254, 0.28);
        flex: 0 0 auto;
        margin-top: 1px;
        animation: status-dot-pulse 1.8s ease-in-out infinite;
      }
      .status-body {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        min-width: 0;
      }
      .status-label {
        font-size: 9px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(226, 232, 240, 0.42);
      }
      .status-copy {
        display: inline-flex;
        align-items: center;
        min-height: 14px;
        font-size: 12px;
        letter-spacing: 0.04em;
        color: rgba(248, 250, 252, 0.92);
      }
      .status-loader {
        display: inline-flex;
        align-items: flex-end;
        gap: 3px;
        height: 10px;
      }
      .status-loader span {
        width: 2px;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(226, 232, 240, 0.18), rgba(191, 219, 254, 0.86));
        transform-origin: center bottom;
        animation: status-bar-rise 1.05s ease-in-out infinite;
        animation-delay: var(--delay, 0s);
      }
      .status-loader span:nth-child(1) { height: 5px; }
      .status-loader span:nth-child(2) { height: 8px; }
      .status-loader span:nth-child(3) { height: 10px; }
      .status-loader span:nth-child(4) { height: 7px; }
      .status-loader span:nth-child(5) { height: 4px; }

      @media (prefers-reduced-motion: reduce) {
        .status-dot,
        .status-loader span {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <video id="startup-video" autoplay muted playsinline></video>
      <section class="overlay">
        <div class="eyebrow">Startup Sequence</div>
        <div class="footer">
          <div class="version">STARCRAW v0.1.9-f9f6b9f</div>
          <div class="status">
            <span class="status-dot" aria-hidden="true"></span>
            <div class="status-body">
              <span class="status-label">System Link</span>
              <span id="status-copy" class="status-copy" aria-live="polite">正在加载插件系统</span>
              <span class="status-loader" aria-hidden="true">
                <span style="--delay: 0s"></span>
                <span style="--delay: 0.12s"></span>
                <span style="--delay: 0.24s"></span>
                <span style="--delay: 0.36s"></span>
                <span style="--delay: 0.48s"></span>
              </span>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script>
      const doneMarker = '__STARTUP_SPLASH_DONE__';
      const errorPrefix = '__STARTUP_SPLASH_ERROR__';
      const finish = (marker) => console.log(marker);
      const params = new URLSearchParams(window.location.search);
      const videoUrl = params.get('video');
      const video = document.getElementById('startup-video');
      const statusCopy = document.getElementById('status-copy');
      const statusMessages = [
        '正在加载插件系统',
        '正在加载通讯组件',
        '正在同步工作台状态',
        '正在校准团队会话',
        '正在准备执行环境',
        '正在连接主控枢纽',
      ];
      let statusIndex = 0;
      let statusTimer = null;

      const startStatusTicker = () => {
        if (!statusCopy) return;
        statusCopy.textContent = statusMessages[0];
        statusTimer = window.setInterval(() => {
          statusIndex = (statusIndex + 1) % statusMessages.length;
          statusCopy.textContent = statusMessages[statusIndex];
        }, 860);
      };

      const stopStatusTicker = () => {
        if (statusTimer) {
          window.clearInterval(statusTimer);
          statusTimer = null;
        }
      };

      if (!videoUrl) {
        finish(`${errorPrefix}:missing-video-url`);
      } else {
        startStatusTicker();
        video.src = videoUrl;
        video.addEventListener('ended', () => finish(doneMarker), { once: true });
        video.addEventListener('error', () => {
          const code = video.error ? video.error.code : 'unknown';
          finish(`${errorPrefix}:media-error-${code}`);
        }, { once: true });
        video.play().catch((error) => {
          finish(`${errorPrefix}:play-rejected:${error && error.message ? error.message : 'unknown'}`);
        });
      }

      window.addEventListener('beforeunload', stopStatusTicker, { once: true });
      setTimeout(() => finish(doneMarker), 12000);
    </script>
  </body>
</html>
